<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Historial de Pedidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
<div class="container bg-white shadow p-4 rounded">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📋 Historial de Pedidos Realizados</h2>
        <a th:href="@{/productos}" class="btn btn-secondary">Volver al Panel</a>
    </div>

    <div th:if="${#lists.isEmpty(historial)}" class="alert alert-info">
        No se han realizado envíos de reportes o pedidos aún.
    </div>

    <table th:if="${not #lists.isEmpty(historial)}" class="table table-hover table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>ID Registro</th>
            <th>Destinatario (Gmail)</th>
            <th>Fecha y Hora de Envío</th>
            <th>Costo Total del Pedido</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="h : ${historial}">
            <td th:text="${h.id}"></td>
            <td th:text="${h.correoDestino}"></td>
            <td th:text="${#temporals.format(h.fechaEnvio, 'dd/MM/yyyy HH:mm')}"></td>
            <td class="fw-bold text-success" th:text="'$' + ${h.costoTotal}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
