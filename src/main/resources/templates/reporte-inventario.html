<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reporte de Inventario Crítico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">
<div class="container bg-white shadow p-4">
    <h2 class="text-danger">Reporte de Productos Faltantes o Caducados</h2>
    <p>Fecha de generación: <span th:text="${fechaGeneracion}"></span></p>

    <table class="table table-striped table-bordered mt-4">
        <thead class="table-dark">
        <tr>
            <th>Producto</th>
            <th>Proveedor (Vendedor)</th>
            <th>Stock Actual</th>
            <th>Estado</th>
            <th>Subtotal Venta</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${productosReporte}">
            <td th:text="${p.nombre}"></td>
            <td th:text="${p.nombreProveedor}"></td>
            <td th:text="${p.stock}"></td>
            <td>
                <span th:if="${p.stock < 10}" class="badge bg-warning">Stock Bajo</span>
                <span th:if="${p.getFechaCaducidad().isBefore(T(java.time.LocalDate).now())}" class="badge bg-danger">Caducado</span>
            </td>
            <td th:text="'$' + ${p.precioVenta * p.stock}"></td>
        </tr>
        </tbody>
        <tfoot>
        <tr class="table-secondary">
            <td colspan="4" class="text-end"><strong>Costo Total Estimado de Venta:</strong></td>
            <td th:text="'$' + ${totalVenta}"></td>
        </tr>
        </tfoot>
    </table>

    <div class="mt-4 no-print">
        <button onclick="window.print()" class="btn btn-primary">Imprimir Reporte</button>
        <a th:href="@{/productos}" class="btn btn-secondary">Volver al Panel</a>
    </div>
    <div class="mt-5 p-4 border rounded bg-light no-print">
        <h4>📧 Enviar este pedido por correo</h4>
        <form th:action="@{/productos/enviar-reporte}" method="post" class="row g-3">
            <div class="col-auto">
                <input type="email" name="correoDestino" class="form-control" placeholder="ejemplo@gmail.com" required>
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-success">Enviar Pedido</button>
            </div>
        </form>

        <div th:if="${successMail}" class="alert alert-success mt-2" th:text="${successMail}"></div>
        <div th:if="${errorMail}" class="alert alert-danger mt-2" th:text="${errorMail}"></div>
    </div>
</div>
</body>
</html>
