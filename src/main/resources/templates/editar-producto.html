<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Editar producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    .card-img-top {
        height: 200px;
        object-fit: cover;
    }
    .navbar-custom {
        background-color: #2c3e50;
    }
</style>
<body>
<div class="modal fade" id="modalProducto" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title" id="modalLabel">Registrar Nuevo Producto</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form th:action="@{/productos/actualizar}" method="post" enctype="multipart/form-data">
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nombre del Producto</label>
                            <input type="text" name="nombre" th:value="${producto.nombre}" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Categoría</label>
                            <input type="text" name="categoria" th:value="${producto.categoria}" class="form-control">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Precio Compra</label>
                            <input type="number" step="0.01" name="precioCompra" th:value="${producto.precioCompra}" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Precio Venta</label>
                            <input type="number" step="0.01" name="precioVenta" th:value="${producto.precioVenta}" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Stock</label>
                            <input type="number" name="stock" th:value="${producto.stock}" class="form-control" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nombre del Proveedor</label>
                            <input type="text" name="nombreProveedor" th:value="${producto.nombreProveedor}" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Fecha de Caducidad</label>
                            <input type="date" name="fechaCaducidad" th:value="${producto.fechaCaducidad}" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label>Imagen Actual: <span th:text="${producto.imagenNombre}"></span></label>
                        <input type="file" name="archivoImagen" class="form-control">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-success">Actualizar Producto</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
