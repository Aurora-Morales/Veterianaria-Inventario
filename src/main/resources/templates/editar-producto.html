<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Veterinaria Bloom - Editar Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-custom {
            background-color: #2c3e50;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark navbar-custom mb-4">
    <div class="container">
        <span class="navbar-brand">📌Panel de Edición de Inventario</span>
        <a th:href="@{/productos}" class="btn btn-outline-light btn-sm">Volver al Panel</a>
    </div>
</nav>

<div class="container bg-white shadow p-4 rounded" style="max-width: 800px;">
    <h3 class="mb-4 text-warning">Editar Producto: <span th:text="${producto.nombre}" class="text-dark"></span></h3>

    <form th:action="@{/productos/actualizar}" method="post" enctype="multipart/form-data">
        <input type="hidden" name="id" th:value="${producto.id}">

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Nombre del Producto</label>
                <input type="text" name="nombre" th:value="${producto.nombre}" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Categoría</label>
                <input type="text" name="categoria" th:value="${producto.categoria}" class="form-control">
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Precio Compra ($)</label>
                <input type="number" step="0.01" name="precioCompra" th:value="${producto.precioCompra}" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Precio Venta ($)</label>
                <input type="number" step="0.01" name="precioVenta" th:value="${producto.precioVenta}" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Stock Actual</label>
                <input type="number" name="stock" th:value="${producto.stock}" class="form-control" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Nombre del Proveedor</label>
                <input type="text" name="nombreProveedor" th:value="${producto.nombreProveedor}" class="form-control">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Fecha de Caducidad</label>
                <input type="date" name="fechaCaducidad" th:value="${producto.fechaCaducidad}" class="form-control" required>
            </div>
        </div>

        <div class="mb-4 p-3 bg-light rounded border">
            <label class="form-label fw-bold">Imagen del Producto</label>
            <input type="file" name="archivoImagen" class="form-control mb-2" accept="image/*">
            <small class="text-muted d-block">
                🖼<strong>Imagen actual:</strong> <span th:text="${producto.imagenNombre}"></span>
            </small>
        </div>

        <div class="d-flex justify-content-end gap-2">
            <a th:href="@{/productos}" class="btn btn-secondary">Cancelar y Volver</a>
            <button type="submit" class="btn btn-warning fw-bold">Guardar Cambios</button>
        </div>
    </form>
</div>

</body>
</html>
