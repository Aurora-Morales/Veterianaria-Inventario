<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel Veterinaria - Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-img-top {
            height: 200px;
            object-fit: cover;
        }
        .navbar-custom {
            background-color: #2c3e50;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark navbar-custom mb-4">
    <div class="container">
        <span class="navbar-brand">VetStock Pro</span>
        <form class="d-flex" method="get" th:action="@{/productos}">
            <input class="form-control me-2" type="search" name="buscar" placeholder="Buscar por nombre...">
            <button class="btn btn-outline-success" type="submit">Buscar</button>
        </form>
    </div>
</nav>

<div class="container">

    <div class="mb-4">
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalProducto">
            + Agregar Nuevo Producto
        </button>
    </div>

    <div th:if="${not #lists.isEmpty(alertas)}" class="alert alert-warning shadow-sm">
        <h5>⚠️ Alerta de Inventario Bajo:</h5>
        <ul>
            <li th:each="a : ${alertas}" th:text="${a.nombre} + ' (Quedan: ' + ${a.stock} + ')' "></li>
        </ul>
    </div>

    <div th:if="${not #lists.isEmpty(alertaFecha)}" class="alert alert-danger shadow-sm">
        <h5>🚫 Productos Caducados o Próximos:</h5>
        <ul>
            <li th:each="f : ${alertaFecha}" th:text="${f.nombre} + ' (Caducó el: ' + ${f.fechaCaducidad} + ')' "></li>
        </ul>
    </div>

    <div class="row">
        <div class="col-md-3 mb-4" th:each="p : ${productos}">
            <div class="card h-100 shadow-sm border-0">
                <img th:src="@{'/images/' + ${p.imagenNombre.trim()}}"
                     class="card-img-top"
                     alt="Imagen del producto">

                <div class="card-body">
                    <h5 class="card-title fw-bold" th:text="${p.nombre}">Nombre</h5>
                    <p class="card-text mb-1">
                        <small class="badge bg-secondary" th:text="${p.categoria}"></small>
                    </p>
                    <p class="card-text small text-muted mb-2">
                        Prov: <span th:text="${p.nombreProveedor}"></span>
                    </p>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div>
                            <span class="d-block text-success small">Venta:</span>
                            <strong th:text="'$' + ${p.precioVenta}"></strong>
                        </div>
                        <div class="text-end">
                            <span class="d-block text-muted small">Compra:</span>
                            <span th:text="'$' + ${p.precioCompra}"></span>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <span class="badge"
                              th:classappend="${p.stock < 10} ? 'bg-danger' : 'bg-success'"
                              th:text="'Stock: ' + ${p.stock}">
                        </span>
                        <span class="badge"
                              th:classappend="${#lists.contains(alertaFecha, p)} ? 'bg-danger' : 'bg-primary'"
                              th:text="'Vence: ' + ${p.fechaCaducidad}">
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalProducto" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title" id="modalLabel">Registrar Nuevo Producto</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form th:action="@{/productos/guardar}" method="post" enctype="multipart/form-data">
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nombre del Producto</label>
                            <input type="text" name="nombre" class="form-control" placeholder="Ej. Bravecto" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Categoría</label>
                            <input type="text" name="categoria" class="form-control" placeholder="Ej. Desparasitante">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Precio Compra</label>
                            <input type="number" step="0.01" name="precioCompra" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Precio Venta</label>
                            <input type="number" step="0.01" name="precioVenta" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Stock</label>
                            <input type="number" name="stock" class="form-control" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nombre del Proveedor</label>
                            <input type="text" name="nombreProveedor" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Fecha de Caducidad</label>
                            <input type="date" name="fechaCaducidad" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Imagen del Producto</label>
                        <input type="file" name="archivoImagen" class="form-control" accept="image/*" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-success">Guardar Producto</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
