<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color: #ecf0f1;
        }

        .navbar-custom {
            background-color: #2c3e50;
        }

        .login-container{
            height: 90vh;
        }

        .login-card{
            width: 400px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        .btn-delete{
            background-color: #c12121;
            color: white;
        }

        .btn-delete:hover {
            background-color: #af0e25;
            color: white;
        }

        .btn-edit {
            background-color: #cc4f1e;
            color: white;
        }

        .btn-edit:hover {
            background-color: #c5420f;
            color: white;
        }

        .form-control:focus{
            border-color: #2c3e50;
            box-shadow: 0 0 5px rgba(44,62,80,0.5);
        }

    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark navbar-custom mb-4">
    <div class="container">
        <img th:src="@{/images/logoVeterinaria.jpeg}" alt="Mi logo" style="width: 50px; height: 50px;">
        <span class="navbar-brand">Veterinaria Bloom</span>
    </div>
</nav>

<!-- Contenedor principal -->
<div class="container d-flex justify-content-center align-items-center login-container">

    <div class="card login-card">

        <div class="card-body p-4">

            <h2 class="text-center mb-4">
                Iniciar Sesión
            </h2>

            <!-- Mensaje de error -->
            <div th:if="${param.error}" class="alert alert-danger">
                Usuario o contraseña incorrectos
            </div>

            <!-- Logout -->
            <div th:if="${param.logout}" class="alert alert-success">
                Sesión cerrada correctamente
            </div>

            <!-- Formulario -->
            <form th:action="@{/principal/validar}" method="post">

                <div class="mb-3">
                    <label class="form-label">
                        Usuario
                    </label>

                    <input
                            type="text"
                            name="username"
                            class="form-control"
                            placeholder="Ingrese su usuario"
                            required>
                </div>

                <div class="mb-4">
                    <label class="form-label">
                        Contraseña
                    </label>

                    <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Ingrese su contraseña"
                            required>
                </div>

                <!-- Botones -->
                <div class="d-grid gap-2">

                    <button type="submit" class="btn btn-edit">
                        Ingresar
                    </button>

                    <button type="reset" class="btn btn-delete">
                        Limpiar
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

</body>

</html>
